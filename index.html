    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f7f5f1;
        font-family: 'Heebo', sans-serif;
        color: #111827;
      }
      
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>

  <body>
    <div id="root">
      <!-- Skeleton shown instantly before JS loads -->
      <div id="app-skeleton" style="
        background: #f7f5f1;
        min-height: 100vh;
        font-family: 'Assistant', Arial, sans-serif;
        direction: rtl;
      ">
        <!-- Skeleton Header -->
        <div style="height:64px; background:#111827; display:flex; align-items:center; padding:0 24px; gap:16px;">
          <div style="width:120px; height:36px; background:#ffffff22; border-radius:8px;"></div>
          <div style="flex:1; max-width:280px; height:32px; background:#ffffff15; border-radius:20px; margin-right:auto;"></div>
        </div>
        <!-- Skeleton Hero -->
        <div style="
          width:100%; 
          height:420px;
          background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
          position:relative; 
          overflow:hidden;
          background-size: 200% 200%;
          animation: shimmer 2s infinite;
        ">
          <div style="
            position:absolute;
            inset:0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            animation: shimmer 1.5s infinite;
          "></div>
        </div>
        <!-- Skeleton Cards -->
        <div style="max-width:1200px; margin:32px auto; padding:0 16px; display:grid; grid-template-columns:1fr; gap:16px;">
          <div style="height:100px; background: linear-gradient(90deg, #e5e7eb, #f0f0f0, #e5e7eb); background-size:200% 100%; border-radius:16px; animation:shimmer 2s infinite;"></div>
          <div style="height:100px; background: linear-gradient(90deg, #e5e7eb, #f0f0f0, #e5e7eb); background-size:200% 100%; border-radius:16px; animation:shimmer 2s infinite; animation-delay:0.1s;"></div>
          <div style="height:100px; background: linear-gradient(90deg, #e5e7eb, #f0f0f0, #e5e7eb); background-size:200% 100%; border-radius:16px; animation:shimmer 2s infinite; animation-delay:0.2s;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
